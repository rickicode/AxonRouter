name: Agentic Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go-router/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Install test dependencies
        run: npm ci
        working-directory: tests

      - name: Verify automation files
        run: |
          test -f docs/ARCHITECTURE.md
          test -f docs/DOCS.md
          test -f .github/workflows/agentic-validation.yml
          test -f .github/workflows/release.yml
          grep -q 'npm publish' .github/workflows/release.yml
          grep -q 'docker/build-push-action' .github/workflows/release.yml

      - name: Verify allowed JS inventory
        run: |
          test -z "$(git ls-files --others --cached --exclude-standard -- '*.js' '*.jsx' '*.mjs' '*.cjs' ':!:node_modules/**' ':!:.next/**' ':!:dist/**' ':!:coverage/**' ':!:build/**' ':!:src/node_modules/**' ':!:tests/tmp/**' ':!:.opencode/**' ':!:bin/axonrouter.js' ':!:bin/mcp-server-launcher.js')"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Go router check
        run: |
          mkdir -p /tmp/go-cache /tmp/go-mod-cache
          env GOCACHE=/tmp/go-cache GOMODCACHE=/tmp/go-mod-cache go test ./...
          env GOCACHE=/tmp/go-cache GOMODCACHE=/tmp/go-mod-cache go build -o /tmp/axonrouter-go-router ./cmd/axonrouter-go-router
        working-directory: go-router

      - name: Build
        run: npm run build
